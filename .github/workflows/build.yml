name: Build & Publish to AUR

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    permissions:
      contents: write

    steps:
      - name: Setup Arch environment
        run: pacman -Syu --noconfirm base-devel git sudo

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-${{ runner.os }}-${{ hashFiles('**/build.yml') }}
          restore-keys: pacman-${{ runner.os }}-

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest version
        id: version
        run: |
          VER=$(curl -s https://api.github.com/repos/zrythm/zrythm/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | sed 's/v//')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Building version: $VER"

      - name: Check if already built
        id: check
        run: |
          EXISTS=$(curl -s https://api.github.com/repos/IRRatium/zrythm-aur-bin/releases/tags/v${{ steps.version.outputs.version }} | grep -c '"tag_name"' || true)
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT

      - name: Install yay
        if: steps.check.outputs.exists == '0'
        run: |
          pacman -Rdd jack2 --noconfirm || true
          cd /tmp
          git clone https://aur.archlinux.org/yay-bin.git
          cd yay-bin
          chown -R builder:builder .
          sudo -u builder makepkg -si --noconfirm

      - name: Build zrythm with yay
        if: steps.check.outputs.exists == '0'
        run: |
          pacman -Rdd jack2 --noconfirm || true
          pacman -Rdd $(pacman -Qq | grep '\-debug$') --noconfirm || true
          sudo -u builder yay -S --noconfirm --ask 4 --overwrite '*' --builddir /home/builder zrythm
          find /home/builder -name "*.pkg.tar.zst" | head -5

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Zrythm ${{ steps.version.outputs.version }}
          files: /home/builder/zrythm/zrythm-${{ steps.version.outputs.version }}-*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute sha256
        if: steps.check.outputs.exists == '0'
        id: sha
        run: |
          PKG=$(find /home/builder -name "zrythm-[0-9]*.pkg.tar.zst" | head -1)
          SHA=$(sha256sum $PKG | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Update AUR
        if: steps.check.outputs.exists == '0'
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF

          git clone ssh://aur@aur.archlinux.org/zrythm-bin.git aur-out

          PKG_URL="https://github.com/IRRatium/zrythm-aur-bin/releases/download/v${{ steps.version.outputs.version }}/zrythm-${{ steps.version.outputs.version }}-x86_64.pkg.tar.zst"

          printf 'pkgname=zrythm-bin\npkgver=%s\npkgrel=1\npkgdesc="Zrythm DAW (prebuilt binary)"\narch=("x86_64")\nurl="https://github.com/IRRatium/zrythm-aur-bin"\nlicense=("AGPL3")\nprovides=("zrythm")\nconflicts=("zrythm")\ndepends=(gtk4 libadwaita pipewire-jack lilv lv2 libcyaml fftw)\nsource=("zrythm.pkg.tar.zst::%s")\nsha256sums=("%s")\n\npackage() {\n  bsdtar -xf "zrythm.pkg.tar.zst" -C "$pkgdir"\n  rm -rf "$pkgdir"/{.PKGINFO,.BUILDINFO,.MTREE}\n}\n' \
            "${{ steps.version.outputs.version }}" "$PKG_URL" "${{ steps.sha.outputs.sha }}" > aur-out/PKGBUILD

          cd aur-out
          makepkg --printsrcinfo > .SRCINFO
          git config user.email "bot@users.noreply.github.com"
          git config user.name "zrythm-bin-bot"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "v${{ steps.version.outputs.version }}"
          git push
